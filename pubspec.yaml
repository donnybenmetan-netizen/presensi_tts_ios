name: presensi_tts
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  geolocator: ^10.1.0
  http: ^1.1.0
  intl: ^0.18.1
  device_info_plus: ^10.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: false
  image_path: "assets/logo_dinas.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo_dinas.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo_dinas.png
    - assets/banner_bawah.png